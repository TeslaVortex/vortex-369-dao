<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vortex-369 Resonance Demo v1.1</title>
    <style>
        body { font-family: Arial, sans-serif; background: #000; color: #fff; text-align: center; }
        #proposal { width: 80%; height: 100px; }
        #score { font-size: 2em; transition: color 0.5s; }
        .green { color: #0f0; animation: pulse 1s infinite; }
        .red { color: #f00; }
        .yellow { color: #ff0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #vortexImage {
            display: none;
            width: 200px;
            height: 200px;
            margin: 10px auto;
        }
        #petition { display: none; }
    </style>
</head>
<body>
    <h1>🌀 Vortex-369 Resonance Scoring v1.1</h1>
    <textarea id="proposal" placeholder="Enter your proposal..."></textarea><br>
    <button onclick="scoreProposal()">Score Resonance</button>
    <p id="score">Score: --</p>
    <div id="breakdown" style="margin: 10px; font-size: 0.8em; color: #ccc;"></div>
    <img id="vortexImage" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Golden_spiral.svg/1200px-Golden_spiral.svg.png" alt="Golden Vortex Spiral" />
    <div id="petition"><a href="https://snapshot.org/" target="_blank">Petition via Snapshot</a> | <a href="https://twitter.com/compose/tweet" target="_blank">Poll on X</a></div>
    <audio id="audio" src="432tone.wav" preload="auto"></audio>
    
    <script>
        let scores = []; // Metrics tracking
        
        function scoreProposal() {
            const proposal = document.getElementById('proposal').value;
            const result = calculateResonance(proposal);
            scores.push(result.score); // Log score
            updateScoreDisplay(result);
            document.getElementById('petition').style.display = 'none'; // Reset
            if (result.score > 66) {
                document.getElementById('audio').play(); // 432 Hz feedback
            } else if (result.score >= 33) {
                document.getElementById('petition').style.display = 'block';
            }
        }
        
        function calculateResonance(text) {
            // Upgraded: Simulate Grok-4 analysis (keywords + intent simulation)
            let score = 10; // Base resonance for any input
            let breakdown = 'Base: 10';
            const positiveKeywords = {
                'vortex': 20,
                'harmony': 20,
                'arcturian': 20,
                'healing': 20,
                'abundance': 20,
                '66': 20,
                '369': 20,
                'resonance': 15,
                '432': 15,
                'manifest': 15,
                'light': 15,
                'service': 15
            };
            let keywordPoints = 0;
            Object.keys(positiveKeywords).forEach(k => {
                if (text.toLowerCase().includes(k.toLowerCase())) {
                    score += positiveKeywords[k];
                    keywordPoints += positiveKeywords[k];
                }
            });
            breakdown += `, Keywords: ${keywordPoints}`;
            if (text.length > 20) { score += 20; breakdown += ', Length: 20'; } else { breakdown += ', Length: 0'; }
            let intentPoints = 0;
            if (text.toLowerCase().includes('help') || text.toLowerCase().includes('unity')) { score += 10; intentPoints += 10; }
            if (text.toLowerCase().includes('conflict') || text.toLowerCase().includes('harm')) { score -= 20; intentPoints -= 20; }
            if (text.toLowerCase().includes('fear') || text.toLowerCase().includes('control') || text.toLowerCase().includes('ego')) { score -= 10; intentPoints -= 10; }
            breakdown += `, Intent: ${intentPoints}`;
            return { score: Math.max(0, Math.min(100, score)), breakdown };
        }
        
        function updateScoreDisplay(result) {
            const el = document.getElementById('score');
            el.textContent = `Score: ${result.score}`;
            el.className = '';
            if (result.score > 66) el.classList.add('green');
            else if (result.score < 33) el.classList.add('red');
            else el.classList.add('yellow');
            const img = document.getElementById('vortexImage');
            if (result.score > 66) {
                img.style.display = 'block';
                img.style.animation = 'spin 2s linear infinite';
                img.style.filter = 'drop-shadow(0 0 10px gold)';
            } else {
                img.style.display = 'none';
                img.style.animation = '';
                img.style.filter = '';
            }
            document.getElementById('breakdown').textContent = result.breakdown;
        }
        
        // Console log metrics after 100 runs (for dev)
        window.addEventListener('beforeunload', () => {
            if (scores.length >= 100) console.log('Metrics:', scores);
        });
    </script>
</body>
</html>
